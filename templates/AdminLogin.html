{% extends 'base.html' %}
{% block title %}Admin Login | DementiaAI{% endblock %}

{% block contents %}
<section
    style="min-height:92vh;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <div
        style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);top:-80px;right:-80px;">
    </div>
    <div
        style="position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.08),transparent 70%);bottom:-60px;left:-60px;">
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-6 col-lg-5 col-xl-4">
                <div class="glass-card p-5" style="border-color:rgba(167,139,250,.2);">
                    <div class="text-center mb-4">
                        <div
                            style="width:64px;height:64px;border-radius:50%;background:rgba(99,102,241,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                            <i class="fa-solid fa-user-shield" style="font-size:1.6rem;color:#a78bfa;"></i>
                        </div>
                        <h4 style="font-weight:800;color:#fff;margin:0;">Admin Portal</h4>
                        <p style="color:#94a3b8;font-size:.88rem;margin-top:.3rem;">Authorised access only</p>
                    </div>

                    <form action="{% url 'AdminLoginCheck' %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label"><i class="fa-solid fa-id-badge me-1"
                                    style="color:#a78bfa;"></i>Admin ID</label>
                            <input type="text" class="form-control" name="loginid" required placeholder="admin"
                                id="adminid">
                        </div>
                        <div class="mb-4">
                            <label class="form-label"><i class="fa-solid fa-lock me-1"
                                    style="color:#a78bfa;"></i>Password</label>
                            <input type="password" class="form-control" name="pswd" required placeholder="password"
                                id="adminpwd">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn py-2 fw-600"
                                style="background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:600;transition:background .2s;"
                                onmouseover="this.style.background='#4f46e5'"
                                onmouseout="this.style.background='#6366f1'">
                                <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Login as Admin
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-4" style="color:#94a3b8;font-size:.85rem;">
                        <a href="{% url 'index' %}" style="color:#a78bfa;text-decoration:none;font-weight:600;">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Home
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
